name: Daily Cyber Bot

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 6 AM PST (2 PM UTC)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore dedup state (cache)
        uses: actions/cache@v4
        with:
          path: state
          key: dedup-state-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python main.py > output.log 2>&1
        
      - name: Upload output log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-output
          path: output.log

