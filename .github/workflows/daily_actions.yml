name: Daily Cyber Bot

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 6 AM PST (2 PM UTC)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API: ${{ secrets.GROQ_API }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_SERVER: smtp.gmail.com
      MAIL_PORT: 465
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore dedup state (cache)
        uses: actions/cache@v4
        with:
          path: state
          key: dedup-state-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: |
          set -o pipefail
          python main.py 2>&1 | tee output.log
        
      - name: Upload output log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-output
          path: output.log

      - name: Email output log
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.MAIL_SERVER }}
          server_port: ${{ env.MAIL_PORT }}
          username: ${{ env.MAIL_USERNAME }}
          password: ${{ env.MAIL_PASSWORD }}
          subject: "CyberBot ${{ job.status }} (run ${{ github.run_number }})"
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_USERNAME }}
          body: "Please find attached the daily bot output log."
          attachments: output.log
          secure: true

